<!DOCTYPE html>
<html>
<head>
    <title>내 포트폴리오</title>
    <style>
        body {
            background-color: #2c3e50; /* 배경: 진한 남색 */
            color: white;              /* 글자: 흰색 */
            line-height: 1.8;          
            margin: 50px;            
        }

        .box {
            background-color: #34495e; /* 상자 배경: 약간 밝은 남색 */
            padding: 30px;             
            border-radius: 20px;       
            max-width: 600px;          
            margin: 0 auto;            
        }

        h1 {
            color: #3498db;            /* 제목 색상: 하늘색 */
            text-align: center;
        }

        .info {
            text-align: center;
            font-weight: bold;
            color: #bdc3c7;
        }

        .goal {
            background-color: #2c3e50;
            padding: 15px;
            border-left: 5px solid #3498db; /* 왼쪽에 파란색 선 */
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>꿈을 설계하는 프로그래머</h1>
        <p class="info">금오공과대학교 컴퓨터공학 전공 2학년</p>

        <hr> <p>안녕하세요! 저는 나만의 세계관을 가진 게임 개발자가 되고 싶습니다.</p>

        <div class="goal">
            <strong>저의 목표:</strong><br>
            "게임의 홍보 웹페이지부터 실제 게임 클라이언트까지 내 손으로 직접 만들고, 
            나만의 고유 스토리를 창작하여 생명력을 불어넣고 싶습니다."
        </div>

        <p>저는 동작 코드들을 AI의 도움을 받아 효율적으로 만들고, 
        그 남는 시간에 스토리와 기획에 더 집중하는 창의적인 프로그래머가 되겠습니다.</p>

        <p style="text-align: center;">
            <a href="https://github.com" style="color: #3498db;">제 GitHub 구경하기</a>
        </p>
    </div>

</body>
</html>
